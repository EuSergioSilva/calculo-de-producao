<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autokiniton App</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #e5e5e5; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .card { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 360px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            box-sizing: border-box; 
        }
        
        h1 { 
            text-align: center; 
            color: #000; 
            text-transform: uppercase; 
            margin: 0 0 15px 0; 
            font-weight: 900; 
            border-bottom: 5px solid #a2ff00; 
            padding-bottom: 8px; 
        }
        
        h2 { 
            font-size: 1rem; 
            color: #000; 
            text-transform: uppercase; 
            margin: 15px 0; 
            text-align: center; 
        }
        
        .campo { margin-bottom: 15px; width: 100%; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 6px; color: #333; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #aaa; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
            background: #fff; 
            color: #000;
        }
        
        button { 
            width: 100%; 
            padding: 12px; 
            background: #a2ff00; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 1.1rem; 
            box-sizing: border-box;
        }
        
        #res { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            display: none; 
        }
        
        .grande { font-size: 3rem; font-weight: 900; display: block; margin: 5px 0; }
        .unidade { font-size: 1rem; font-weight: bold; display: block; text-transform: uppercase; }

        .quadro-exemplo { 
            margin-top: 25px; 
            border: 2px solid #000; 
            width: 100%; 
            max-width: 360px; 
            background: #fff; 
            padding: 15px; 
            border-radius: 10px; 
            box-sizing: border-box; 
        }
        
        .titulo-exemplo { 
            font-weight: 900; 
            font-size: 0.9rem; 
            text-align: center; 
            display: block; 
            margin-bottom: 10px; 
            border-bottom: 1px solid #000; 
            padding-bottom: 5px; 
        }
        
        .formula-exemplo { 
            font-size: 1.1rem; 
            font-weight: bold; 
            text-align: center; 
            padding: 10px; 
        }
        
        .legenda { 
            font-size: 0.75rem; 
            text-align: center; 
            margin-top: 5px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>AUTOKINITON</h1>
        <h2>CÁLCULO DE PRODUÇÃO</h2>

        <div class="campo">
            <label>Turno / Tempo:</label>
            <select id="tempo">
                <option value="430">1º TURNO (430 MIN)</option>
                <option value="425">2º TURNO (425 MIN)</option>
                <option value="385">3º TURNO (385 MIN)</option>
                <option value="330">SÁBADO (330 MIN)</option>
                <option value="60">HORA/HORA</option>
            </select>
        </div>

        <div class="campo">
            <label>Meta (Pçs/Hora):</label>
            <input type="number" id="meta" placeholder="Ex: 45">
        </div>

        <div class="campo">
            <label>Total Produzido:</label>
            <input type="number" id="prod" placeholder="Ex: 300">
        </div>

        <button id="btn">Calcular Agora</button>

        <div id="res">
            <b id="status"></b>
            <span id="valor" class="grande">0</span>
            <span class="unidade">Minutos</span>
            <b id="info" style="display:block; margin-top:10px;"></b>
        </div>
    </div>

    <div class="quadro-exemplo">
        <span class="titulo-exemplo">EXEMPLO DE CÁLCULO</span>
        <div class="formula-exemplo">
            60 ÷ 45 x 300 - 430 = -30
        </div>
        <div class="legenda">PERDA A SER APONTADA</div>
    </div>

    <script>
        document.getElementById('btn').addEventListener('click', function() {
            const t = parseFloat(document.getElementById('tempo').value);
            const m = parseFloat(document.getElementById('meta').value);
            const p = parseFloat(document.getElementById('prod').value);
            const display = document.getElementById('res');

            if (m > 0 && !isNaN(p)) {
                const resultado = Math.round(((60 / m) * p) - t);
                const pecasDif = Math.round((resultado * m) / 60);
                
                display.style.display = 'block';
                document.getElementById('valor').innerText = resultado > 0 ? '+' + resultado : resultado;
                
                if (resultado < 0) {
                    display.style.backgroundColor = '#ffebee';
                    display.style.color = '#c62828';
                    document.getElementById('status').innerText = 'TEMPO A APONTAR:';
                    document.getElementById('info').innerText = '(' + Math.abs(pecasDif) + ' PEÇAS ABAIXO)';
                } else {
                    display.style.backgroundColor = '#e8f5e9';
                    display.style.color = '#2e7d32';
                    document.getElementById('status').innerText = 'SALDO POSITIVO:';
                    document.getElementById('info').innerText = '(' + Math.abs(pecasDif) + ' PEÇAS ACIMA)';
                }
            } else {
                alert('Preencha a Meta e a Produção!');
            }
        });
    </script>
</body>
</html>
